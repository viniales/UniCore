<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniCore - System Zarządzania</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        }

        body {
            background: var(--bg-gradient);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            color: #334155;
        }

        /* Nowoczesny pasek nawigacji z eleganckim cieniem */
        .navbar-custom {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.5px;
            font-size: 1.25rem;
        }

        /* Wyrównanie sekcji użytkownika - TO NAPRAWIA KRZYWY PRZYCISK */
        .user-section {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .user-badge {
            background: rgba(255, 255, 255, 0.08);
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-size: 0.85rem;
            color: #f8fafc;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
        }

        .btn-logout {
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.4rem 1.2rem;
            border-radius: 8px;
            background-color: transparent;
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            transition: all 0.2s ease-in-out;
        }

        .btn-logout:hover {
            background-color: #ef4444;
            color: white;
            border-color: #ef4444;
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-5 z-3 position-relative">
        <div class="container">
            <a class="navbar-brand text-white d-flex align-items-center" href="/">
                <i class="fa-solid fa-layer-group fs-4 me-2" style="color: #60a5fa;"></i>
                UniCore
            </a>

            {% if user.is_authenticated %}
            <div class="ms-auto user-section">
                <div class="user-badge d-none d-md-block">
                    <i class="fa-regular fa-circle-user me-2 opacity-75"></i>Zalogowano jako: <strong class="ms-1">{{ user.username }}</strong>
                </div>

                <form action="{% url 'logout' %}" method="post" class="m-0 p-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-logout shadow-sm">
                        <i class="fa-solid fa-power-off me-2"></i>Wyloguj
                    </button>
                </form>
            </div>
            {% endif %}
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
