{% extends 'core/base.html' %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0 p-4">
                <h3 class="fw-bold text-primary mb-4 border-bottom pb-2">{{ tytul }}</h3>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-secondary">{{ field.label }}</label>
                            {{ field }}
                            {% if field.help_text %}<div class="form-text">{{ field.help_text }}</div>{% endif %}
                            {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
                        </div>
                    {% endfor %}
                    <div class="d-flex justify-content-between mt-4">
                        <a href="/" class="btn btn-light">Anuluj</a>
                        <button type="submit" class="btn btn-primary px-4">Zapisz w bazie</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
